<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/1.10.0/jquery.min.js"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script type="text/javascript">
      $(document).ready(function(){
        $("#sub").on("click",function(){
          var urll=$("#url").val();
          var tt=$("#text").val();
          var mention=$("#member").val().split(" ");
          var d='{"msgtype":"text","text":{"content":'+'"'+tt+'",'+'"'+'memtioned_list'+'":'+'[';
          mention.forEach(function(value,index){
             d=d+'"'+value+'",';
          })
          d=d+']'+'}}';
          console.log(d);
          $.ajax({
            url:urll,
            data:d,
            type:"POST"
          });
        });
        }
      );
    </script>
  </head>
  <body>
    <div class="container">
        <div class="row" id="text_area">
          <div class="col-md-3">

          </div>
          <div class="col-md-6">
            <div>
              <label for="name">地址：</label>
              <input type="text" class="form-control" id="url" placeholder="url">
            </div>
            <div>
              <label for="name">文本：</label>
              <input type="text" class="form-control" id="text" placeholder="文本内容">
            </div>
            <div class="">
              <label for="name">是否@人</label>
              <input type="text" class="form-control" id="member" placeholder="要提醒的群成员，以空格隔开">
            </div>
            <button class="btn btn-default" id="sub">提交</button>
          </div>
          <div class="col-md-3">

          </div>
        </div>
        <div class="row" id="markdown_area">

          <div class="col-md-3">
          </div>
          <div class="col-md-6">

          </div>
          <div class="col-md-3">

          </div>
        </div>
    </div>
  </body>
</html>
